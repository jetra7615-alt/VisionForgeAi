<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vision Forge AI</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0b0b12;
  color: white;
}

/* LAYOUT */
.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #111;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sidebar h2 {
  margin-bottom: 10px;
}

.sidebar button {
  background: #1a1a22;
  border: none;
  padding: 10px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  text-align: left;
}

.sidebar button:hover {
  background: #2a2a35;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* TOP BAR */
.topbar {
  padding: 12px 20px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

/* CHAT AREA */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 30px;
}

.message {
  margin-bottom: 20px;
  max-width: 600px;
}

.user {
  margin-left: auto;
  text-align: right;
  color: #aaa;
}

.ai {
  background: #151520;
  padding: 15px;
  border-radius: 12px;
}

.ai img {
  margin-top: 10px;
  width: 100%;
  border-radius: 10px;
}

/* INPUT BAR */
.inputBar {
  padding: 15px;
  border-top: 1px solid #222;
  display: flex;
  gap: 10px;
}

.inputBar input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #1a1a22;
  color: white;
}

.inputBar select {
  background: #1a1a22;
  border: none;
  color: white;
  border-radius: 8px;
}

.inputBar button {
  background: #7a5cff;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
}

/* PAGES */
.page {
  display: none;
}

.active {
  display: block;
}

/* LOGIN */
#login {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #111;
  padding: 30px;
  border-radius: 10px;
}

.login-box input {
  width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Vision Forge AI</h2>
    <input placeholder="Email">
    <input placeholder="Password" type="password">
    <button onclick="start()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="app">

  <div class="sidebar">
    <h2>Vision Forge</h2>
    <button onclick="show('chat')">💬 Generate</button>
    <button onclick="show('history')">📜 History</button>
    <button onclick="show('premium')">💎 Premium</button>
  </div>

  <div class="main">

    <div class="topbar">
      <div>Credits: <b id="credits">100</b></div>
      <div>Images: <b id="images">0</b></div>
    </div>

    <!-- CHAT -->
    <div id="chat" class="chat page active"></div>

    <!-- HISTORY -->
    <div id="history" class="chat page"></div>

    <!-- PREMIUM -->
    <div id="premium" class="chat page">
      <h2>Upgrade</h2>
      <p>Unlock Sora 2 & Nano Banana Pro</p>
      <button onclick="upgrade()">Upgrade</button>
    </div>

    <!-- INPUT -->
    <div class="inputBar">
      <input id="prompt" placeholder="Type something..." />

      <select id="model">
        <option value="5">Basic</option>
        <option value="10">Pro</option>
        <option value="20">Ultra</option>
        <option value="premium">Sora 2 🔒</option>
      </select>

      <button onclick="generate()">Send</button>
    </div>

  </div>
</div>

<script>
let credits = 100;
let images = 0;
let premium = false;
let history = [];

function start() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

function show(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

function generate() {
  let prompt = document.getElementById("prompt").value;
  let model = document.getElementById("model").value;

  if (!prompt) return;

  if (model === "premium" && !premium) {
    alert("Premium only");
    return;
  }

  let cost = parseInt(model) || 0;
  if (credits < cost) return alert("No credits");

  credits -= cost;
  images++;

  document.getElementById("credits").innerText = credits;
  document.getElementById("images").innerText = images;

  let url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

  let chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="message user">${prompt}</div>
    <div class="message ai">
      Generating...
    </div>
  `;

  setTimeout(() => {
    chat.innerHTML += `
      <div class="message ai">
        <img src="${url}">
        <br>
        <a href="${url}" download><button>Download</button></a>
      </div>
    `;
  }, 700);

  history.push(url);
  document.getElementById("history").innerHTML =
    history.map(i => `<img src="${i}" width="100">`).join("");
}

function upgrade() {
  premium = true;
  alert("Premium enabled");
}
</script>

</body>
</html>
