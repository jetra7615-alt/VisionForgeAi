<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vision Forge AI</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0a0f, #12122a);
  color: white;
}

/* LOGIN */
#login {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  animation: fadeIn 1s ease;
}

.login-box h1 {
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  padding: 12px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, #7a5cff, #00d4ff);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* APP */
#app {
  display: none;
  height: 100vh;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.sidebar button {
  margin: 5px 0;
  background: rgba(255,255,255,0.05);
}

.sidebar button:hover {
  background: rgba(255,255,255,0.1);
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* TOPBAR */
.topbar {
  padding: 15px;
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* CHAT */
.chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.message {
  margin: 15px 0;
  animation: fadeIn 0.5s ease;
}

.user {
  text-align: right;
  color: #aaa;
}

.ai {
  text-align: left;
}

.ai img {
  max-width: 280px;
  border-radius: 12px;
  margin-top: 10px;
  transition: 0.3s;
}

.ai img:hover {
  transform: scale(1.05);
}

/* INPUT */
.inputBox {
  display: flex;
  gap: 10px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
}

.inputBox input {
  flex: 1;
}

/* HISTORY */
#history {
  display: none;
  padding: 20px;
}

#history img {
  width: 90px;
  margin: 5px;
  border-radius: 10px;
  transition: 0.3s;
}

#history img:hover {
  transform: scale(1.1);
}

/* PREMIUM */
#premium {
  display: none;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h1>Vision Forge AI</h1>
    <input placeholder="Email">
    <input placeholder="Password" type="password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="sidebar">
    <button onclick="show('chat')">💬 Generate</button>
    <button onclick="show('history')">📜 History</button>
    <button onclick="show('premium')">💎 Premium</button>
  </div>

  <div class="main">

    <div class="topbar">
      <span>Credits: <b id="credits">100</b></span>
      <span>Images: <b id="images">0</b></span>
    </div>

    <div id="chat" class="chat"></div>

    <div id="history"></div>

    <div id="premium">
      <div class="card">
        <h2>Go Premium</h2>
        <p>Unlock Sora 2 & Nano Banana Pro</p>
        <button onclick="upgrade()">Upgrade</button>
      </div>
    </div>

    <div class="inputBox">
      <input id="prompt" placeholder="Describe anything..." />

      <select id="model">
        <option value="5">Basic</option>
        <option value="10">Pro</option>
        <option value="20">Ultra</option>
        <option value="premium">Sora 2 🔒</option>
        <option value="premium">Nano Banana Pro 🔒</option>
      </select>

      <button onclick="generate()">Generate</button>
    </div>

  </div>
</div>

<script>
let credits = 100;
let images = 0;
let isPremium = false;
let history = [];

function login() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

function show(tab) {
  document.getElementById("chat").style.display = "none";
  document.getElementById("history").style.display = "none";
  document.getElementById("premium").style.display = "none";
  document.getElementById(tab).style.display = "block";
}

function generate() {
  let prompt = document.getElementById("prompt").value;
  let model = document.getElementById("model").value;

  if (!prompt) return;

  if (model === "premium" && !isPremium) {
    alert("Premium only!");
    return;
  }

  let cost = parseInt(model) || 0;

  if (credits < cost) {
    alert("Not enough credits");
    return;
  }

  credits -= cost;
  images++;

  updateUI();

  let chat = document.getElementById("chat");

  let msg = document.createElement("div");
  msg.innerHTML = `
    <div class="message user">${prompt}</div>
    <div class="message ai">Generating...</div>
  `;

  chat.appendChild(msg);

  let url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

  setTimeout(() => {
    msg.querySelector(".ai").innerHTML = `
      <img src="${url}">
      <br>
      <a href="${url}" download><button>Download</button></a>
    `;
  }, 800);

  history.push(url);
  updateHistory();
}

function updateUI() {
  document.getElementById("credits").innerText = credits;
  document.getElementById("images").innerText = images;
}

function updateHistory() {
  document.getElementById("history").innerHTML =
    history.map(img => `<img src="${img}">`).join("");
}

function upgrade() {
  isPremium = true;
  alert("Premium unlocked 🚀");
}
</script>

</body>
</html>
